#[tool.commitizen]
#name = "cz_customize"
#tag_format = "v$version"
#update_changelog_on_bump = true
#changelog_file = "CHANGELOG.md"
#version_scheme = "semver"
#schema_pattern = "(feat|fix|docs|style|refactor|test|chore|perf|build|ci)(\\(isolated-service|glucode-service\\))(!)?:(\\s.*)"

[tool.commitizen]
name = "cz_customize"
version = "0.1.0"
tag_format = "v$version"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
version_scheme = "semver"

bump_pattern = "^(feat|fix|perf|refactor)(\\(glucode-service\\))(!)?:"

[tool.commitizen.bump_map]
feat = "MINOR"
fix = "PATCH"
perf = "PATCH"
refactor = "PATCH"

changelog_pattern = "^(feat|fix|perf|refactor)(\\(glucode-service\\))"

schema_pattern = "(feat|fix|docs|style|refactor|test|chore|perf|build|ci)(\\(isolated-service|glucode-service\\))(!)?:(\\s.*)"

[tool.commitizen.customize]
message_template = "{{change_type}}({{scope}}): {{message}}"
example = "feat(glucode-service): add login API"
schema = "<type>(<scope>): <subject>"